<div class="header">
  <button class="toggle-btn" (click)="toggleSidebar()">☰</button>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search inventory..." />
  </div>

  <div class="header-center" *ngIf="!isLoggedIn">
    <a routerLink="/login" routerLinkActive="active-link" class="auth-btn">Login</a>
    <a routerLink="/signup" routerLinkActive="active-link" class="auth-btn signup">Sign Up</a>
  </div>

  <div class="header-right">
    <button class="icon-btn">🔔</button>

    <div class="avatar" (click)="toggleDropdown()">
      {{ initial }}
    </div>

    <div class="dropdown" *ngIf="showDropdown">
      <ng-container *ngIf="isLoggedIn; else notLoggedIn">
        <div class="dropdown-header">
          <div class="dropdown-avatar">{{ initial }}</div>
          <div>
            <div class="dropdown-name">{{ profile?.username }}</div>
            <div class="dropdown-email">{{ profile?.email }}</div>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <div class="dropdown-item">
          <span>👤</span><span>{{ profile?.username }}</span>
        </div>
        <div class="dropdown-item">
          <span>📧</span><span>{{ profile?.email }}</span>
        </div>
        <div class="dropdown-item">
          <span>📱</span><span>{{ profile?.mobile }}</span>
        </div>

        <div class="dropdown-divider"></div>

        <button class="logout-btn" (click)="logout()">
          🚪 Logout
        </button>
      </ng-container>

      <ng-template #notLoggedIn>
        <div class="dropdown-item">
          <span>⚠️</span><span>Not logged in</span>
        </div>
        <a routerLink="/login" class="logout-btn"
           style="text-align:center; text-decoration:none; display:block;">
          🔐 Login
        </a>
      </ng-template>
    </div>
  </div>
</div>

<!-- backdrop -->
<!-- <div class="dropdown-backdrop" *ngIf="showDropdown" (click)="showDropdown = false"></div> -->

<!-- ✅ Logout Popup -->
<div class="popup-overlay" *ngIf="showLogoutPopup">
  <div class="popup-box">
    <div class="popup-icon">👋</div>
    <h3>Logged Out Successfully!</h3>
    <p>See you again soon</p>
    <div class="popup-progress"></div>
  </div>
</div>
