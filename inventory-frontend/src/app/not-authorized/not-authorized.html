<div class="unauth-wrapper">
  <div class="unauth-card">
    <div class="lock-icon">🔒</div>
    <h2>Access Restricted</h2>
    <p>You need to be signed in to view this page.</p>
    <p class="countdown">Redirecting in <span>{{ countdown }}</span> seconds...</p>
    <div class="redirect-bar"></div>
    <div class="unauth-btns">
      <a routerLink="/" class="btn-home"><span class="btn-home-icon" aria-hidden="true">⌂</span> Home</a>
      <a routerLink="/login" class="btn-login">Sign In</a>
      <a routerLink="/signup" class="btn-signup">Create Account</a>
    </div>
  </div>
</div>
