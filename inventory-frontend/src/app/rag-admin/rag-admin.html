<div class="rag-admin">
  <div class="rag-admin__head">
    <a routerLink="/dashboard" class="rag-admin__back">← Dashboard</a>
    <h1>Search index</h1>
    <p class="rag-admin__sub">Refresh vectors after big data changes. Chat: floating button (bottom right).</p>
  </div>

  <section class="rag-card">
    <h2>Status</h2>
    <div class="rag-actions">
      <button type="button" class="btn primary" (click)="loadStatus()" [disabled]="statusLoading">
        {{ statusLoading ? 'Loading…' : 'Refresh' }}
      </button>
    </div>
    <p class="rag-error" *ngIf="statusError">{{ statusError }}</p>
    <pre class="rag-pre" *ngIf="statusJson !== null">{{ statusJson | json }}</pre>
  </section>

  <section class="rag-card">
    <h2>Reindex</h2>
    <p class="rag-hint">Rebuilds Pinecone from the latest API snapshot.</p>
    <button type="button" class="btn warn" (click)="reindex()" [disabled]="reindexLoading">
      {{ reindexLoading ? 'Working…' : 'Run reindex' }}
    </button>
    <p class="rag-success" *ngIf="reindexMessage">{{ reindexMessage }}</p>
    <p class="rag-error" *ngIf="reindexError">{{ reindexError }}</p>
  </section>
</div>
