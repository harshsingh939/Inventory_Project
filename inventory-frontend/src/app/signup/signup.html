<div class="auth-wrapper">
  <div class="auth-card">
    <a routerLink="/" class="back-btn">← Back to Home</a>

    <div class="auth-brand">
      <div class="brand-icon">IT</div>
      <div>
        <div class="brand-name">InvenTrack</div>
        <div class="brand-sub">INVENTORY SYSTEM</div>
      </div>
    </div>

    <h2>Create Account</h2>
    <p class="auth-subtitle">Join InvenTrack today</p>

    <div class="form-field">
      <label>Username</label>
      <input
        class="input"
        type="text"
        placeholder="Enter username"
        [(ngModel)]="username"
        name="username"
      />
    </div>

    <div class="form-field">
      <label>Mobile Number</label>
      <input
        class="input"
        type="tel"
        placeholder="Enter 10-digit mobile number"
        [(ngModel)]="mobile"
        name="mobile"
      />
    </div>

    <div class="form-field">
      <label>Gmail / Email</label>
      <input
        class="input"
        type="email"
        placeholder="Enter email address"
        [(ngModel)]="email"
        name="email"
      />
    </div>

    <div class="form-field">
      <label>Password</label>
      <div class="input-eye">
        <input
          class="input"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Min 6 characters"
          [(ngModel)]="password"
          name="password"
        />
        <span class="eye-btn" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁️' }}
        </span>
      </div>
    </div>

    <div class="form-field">
      <label>Confirm Password</label>
      <div class="input-eye">
        <input
          class="input"
          [type]="showConfirm ? 'text' : 'password'"
          placeholder="Re-enter password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
        />
        <span class="eye-btn" (click)="showConfirm = !showConfirm">
          {{ showConfirm ? '🙈' : '👁️' }}
        </span>
      </div>
    </div>

    <!-- ✅ Error & Success UI pe dikhega -->
    <div class="form-error"   *ngIf="signupError">⚠️ {{ signupError }}</div>
    <div class="form-success" *ngIf="signupSuccess">{{ signupSuccess }}</div>

    <button class="full-btn" type="button" (click)="onSignup()" [disabled]="isLoading">
      {{ isLoading ? 'Creating Account...' : 'Create Account' }}
    </button>

    <p class="switch-text">
      Already have an account?
      <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
